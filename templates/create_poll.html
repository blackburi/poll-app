
{% extends "base.html" %}

{% block title %}투표 생성{% endblock %}

{% block content %}
<section class="form-card">
  <div class="section-header">
    <div>
      <span class="badge">관리자 인증 완료</span>
      <h1 style="margin:14px 0 8px;">새 투표 생성</h1>
      <p class="muted">여기서는 제목, 설명, 기간, 항목을 입력해서 새 투표를 만들 수 있어.</p>
    </div>
  </div>

  <form method="post" action="{{ url_for('create_poll') }}">
    <div class="form-row">
      <label for="title">투표 제목</label>
      <input
        id="title"
        name="title"
        type="text"
        value="{{ form_data.get('title', '') }}"
        placeholder="예: 이번 주 레이드 시간 조사"
        required
      >
    </div>

    <div class="grid-2">
      <div class="form-row">
        <label for="creator_nickname">개설자 닉네임</label>
        <input
          id="creator_nickname"
          name="creator_nickname"
          type="text"
          value="{{ form_data.get('creator_nickname', '') }}"
          placeholder="비워두면 관리자 닉네임으로 저장"
        >
      </div>

      <div class="form-row">
        <label for="description">설명</label>
        <input
          id="description"
          name="description"
          type="text"
          value="{{ form_data.get('description', '') }}"
          placeholder="선택 사항"
        >
      </div>
    </div>

    <div class="grid-2">
      <div class="form-row">
        <label for="start_at">시작 시간</label>
        <input
          id="start_at"
          name="start_at"
          type="datetime-local"
          value="{{ form_data.get('start_at', '') }}"
          required
        >
      </div>

      <div class="form-row">
        <label for="end_at">종료 시간</label>
        <input
          id="end_at"
          name="end_at"
          type="datetime-local"
          value="{{ form_data.get('end_at', '') }}"
          required
        >
      </div>
    </div>

    <div class="form-row">
      <label for="options_text">투표 항목</label>
      <textarea
        id="options_text"
        name="options_text"
        placeholder="한 줄에 하나씩 입력해줘&#10;예: 월요일 9시&#10;화요일 10시"
        required
      >{{ form_data.get('options_text', '') }}</textarea>
      <small class="helper-text">중복 항목은 자동으로 제거돼.</small>
    </div>

    <div class="form-actions">
      <button type="submit" class="btn btn-primary">투표 생성</button>
      <a class="btn btn-secondary" href="{{ url_for('index') }}">목록으로</a>
    </div>
  </form>
</section>
{% endblock %}
