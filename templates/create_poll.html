{% extends 'base.html' %}
{% block title %}새 투표 만들기{% endblock %}
{% block content %}
<section class="card">
  <h1>새 투표 만들기</h1>
  <p class="muted">닉네임만으로 참여하는 공개 투표를 생성해. 종료 후 결과는 웹훅으로 보낼 수 있어.</p>

  <form method="post" class="form-grid">
    <label>
      <span>투표 제목</span>
      <input type="text" name="title" placeholder="예: 이번 주 공성 참여 시간" required>
    </label>

    <label>
      <span>개설자 닉네임</span>
      <input type="text" name="creator_nickname" placeholder="예: 대재">
    </label>

    <label class="full">
      <span>설명</span>
      <textarea name="description" rows="3" placeholder="예: 부캐 가능 시간, 특이사항은 댓글로 남겨주세요."></textarea>
    </label>

    <label class="full">
      <span>투표 항목 (한 줄에 하나씩)</span>
      <textarea name="options_text" rows="6" placeholder="20:00&#10;21:00&#10;22:00" required></textarea>
    </label>

    <label>
      <span>시작 시간</span>
      <input type="datetime-local" name="start_at" required>
    </label>

    <label>
      <span>종료 시간</span>
      <input type="datetime-local" name="end_at" required>
    </label>

    <label class="checkbox-row">
      <input type="checkbox" name="show_live_result" checked>
      <span>진행 중 결과 공개</span>
    </label>

    <label class="checkbox-row">
      <input type="checkbox" name="show_voter_names" checked>
      <span>닉네임 공개</span>
    </label>

    <div class="full actions">
      <button class="button" type="submit">투표 생성</button>
    </div>
  </form>
</section>
{% endblock %}
